<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steganography App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Steganography Secure Data Hiding</h1>

<h2>Encode Message</h2>
<form id="encodeForm">
    <input type="file" id="imageInput" required><br><br>
    <textarea id="messageInput" placeholder="Enter secret message" required></textarea><br><br>
    <input type="password" id="encryptionKey" placeholder="Encryption Key" required><br><br>
    <button type="submit">Encode</button>
</form>

<img id="encodedImage" />
<a id="downloadLink">Download Image</a>

<hr>

<h2>Decode Message</h2>
<form id="decodeForm">
    <input type="file" id="encodedImageInput" required><br><br>
    <input type="password" id="decryptionKey" placeholder="Key" required><br><br>
    <button type="submit">Decode</button>
</form>

<h3 id="decodedMessage"></h3>

<script src="script.js"></script>
</body>
</html>
